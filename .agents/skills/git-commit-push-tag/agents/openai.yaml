---
interface:
  display_name: "Git Commit Push Tag"
  short_description: >-
    CI-gated commit, tag, push, and release flow.
  default_prompt: >-
    Use $git-commit-push-tag to analyze the next SemVer bump; mutate only with
    an explicit BUMP and complete a requested GitHub Release only after its
    automatic Release package CI succeeds.
policy:
  allow_implicit_invocation: false
