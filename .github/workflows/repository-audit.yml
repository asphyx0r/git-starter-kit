---
name: Repository audit

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md"

  spelling:
    name: Spelling
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Codespell
        run: python -m pip install codespell==2.4.2

      - name: Run Codespell
        run: codespell .
