---
name: Repository audit

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md"

  spelling:
    name: Spelling
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Codespell
        run: python -m pip install codespell==2.4.2

      - name: Run Codespell
        run: codespell .

  static:
    name: Static checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Check Git whitespace
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          zero_sha="0000000000000000000000000000000000000000"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git diff --check "origin/$GITHUB_BASE_REF...HEAD"
          elif [ -n "${BEFORE_SHA:-}" ]; then
            if [ "$BEFORE_SHA" != "$zero_sha" ]; then
              git diff --check "$BEFORE_SHA..HEAD"
            else
              git diff-tree --check --root -r HEAD
            fi
          else
            git diff-tree --check --root -r HEAD
          fi

      - name: Check Bash syntax
        run: bash -n scripts/git-init.sh

      - name: Run ShellCheck
        run: shellcheck scripts/git-init.sh

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()
          foreach ($path in @(
            "scripts/build-release-package.ps1",
            "scripts/git-init.ps1"
          )) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $path,
              [ref]$tokens,
              [ref]$parseErrors
            ) | Out-Null

            if ($parseErrors.Count -gt 0) {
              $errors += $parseErrors
            }
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Check commitlint config
        run: node --check commitlint.config.cjs
